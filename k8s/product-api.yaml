apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-api
  namespace: telepresence-demo
  labels:
    app: product-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-api
  template:
    metadata:
      labels:
        app: product-api
    spec:
      containers:
        - name: product-api
          image: ${ACR_NAME}.azurecr.io/product-api:latest
          ports:
            - containerPort: 8081
          env:
            - name: SERVER_PORT
              value: "8081"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-api
  namespace: telepresence-demo
  labels:
    app: product-api
spec:
  selector:
    app: product-api
  ports:
    - port: 80
      targetPort: 8081
