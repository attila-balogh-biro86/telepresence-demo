apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-front
  namespace: telepresence-demo
  labels:
    app: store-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: store-front
  template:
    metadata:
      labels:
        app: store-front
    spec:
      containers:
        - name: store-front
          image: ${ACR_NAME}.azurecr.io/store-front:latest
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: PRODUCT_API_URL
              value: "http://product-api.telepresence-demo"
            - name: ORDER_API_URL
              value: "http://order-api.telepresence-demo"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: store-front
  namespace: telepresence-demo
  labels:
    app: store-front
spec:
  type: LoadBalancer
  selector:
    app: store-front
  ports:
    - port: 80
      targetPort: 8080
