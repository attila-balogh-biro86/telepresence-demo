apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: telepresence-demo
  labels:
    app: order-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      containers:
        - name: order-api
          image: ${ACR_NAME}.azurecr.io/order-api:latest
          ports:
            - containerPort: 8082
          env:
            - name: SERVER_PORT
              value: "8082"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/orders
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: telepresence-demo
  labels:
    app: order-api
spec:
  selector:
    app: order-api
  ports:
    - port: 80
      targetPort: 8082
